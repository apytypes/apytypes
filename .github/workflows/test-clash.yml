#
# This workflow will run the APyTypes test suite including the cocotb, VHDL generation, and VUnit tests.
#
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
#


name: Unit tests (Clash code generation)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: "ubuntu-latest"

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0
        fetch-tags: true
        persist-credentials: false
    # - uses: nickg/setup-nvc@40dcbd31cf07b60479a31f94a5df70c0bfbb9ce5  # v1v1
    - name: Set up Python 3.11
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        python-version: "3.11"
    - name: Setup Haskell
      uses: haskell-actions/setup@v2
      with:
        ghc-version: "9.6.6"
        cabal-version: "latest"

    - name: Install Clash
      run: |
        cabal update
        cabal install clash-ghc --overwrite-policy=always
        cabal install --lib clash-prelude ghc-typelits-knownnat
        clash --version
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest numpy "meson>=1.10.1" meson-python setuptools_scm pytest-cov ninja
    - name: Install APyTypes
      run: |
        git fetch --tags
        python -m pip install --no-deps --no-build-isolation -v --editable .
    - name: Test with pytest
      run: |
        pytest --color=yes --cov=lib --log-level=DEBUG lib/test
    - name: Upload coverage reports to Codecov
      if: ${{ !cancelled()}}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
      with:
        flags: hdl
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
