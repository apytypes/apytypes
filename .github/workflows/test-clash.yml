#
# This workflow will run the APyTypes test suite including the cocotb, VHDL generation, and VUnit tests.
#
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
#


name: Unit tests (Clash code generation)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: "ubuntu-latest"

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
        fetch-tags: true
        persist-credentials: false
    # - uses: nickg/setup-nvc@40dcbd31cf07b60479a31f94a5df70c0bfbb9ce5  # v1v1
    - name: Set up Python 3.10
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.10"
    - name: Setup Haskell
      uses: haskell-actions/setup@v2
      with:
        ghc-version: "9.6.6"
        cabal-version: "latest"

    - name: Install Clash
      run: |
        cabal update
        cabal install clash-ghc --overwrite-policy=always
        cabal install --lib clash-prelude ghc-typelits-knownnat
        clash --version
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest numpy "meson>=1.10.1" meson-python setuptools_scm pytest-cov ninja
    - name: Install APyTypes
      run: |
        git fetch --tags
        python -m pip install --no-deps --no-build-isolation -v --editable .
    - name: Test with pytest
      run: |
        pytest --color=yes --cov=lib --log-level=DEBUG lib/test
    - name: Upload coverage reports to Codecov
      if: ${{ !cancelled()}}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        flags: hdl
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
