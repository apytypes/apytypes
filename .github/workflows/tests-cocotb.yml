#
# This workflow will run the APyTypes test suite including the cocotb, VHDL generation, and VUnit tests.
#
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
#


name: Unit tests (cocotb examples)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
    runs-on: "ubuntu-latest"

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        fetch-depth: 0
        fetch-tags: true
        persist-credentials: false
    # - uses: nickg/setup-nvc@40dcbd31cf07b60479a31f94a5df70c0bfbb9ce5  # v1v1
    - name: Set up Python 3.10
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: "3.10"
    - uses: nickg/setup-nvc@master  # v1v1
      with:
        version: latest
    - name: Set up GHDL
      uses: ghdl/setup-ghdl@v1
    - name: Install HDL toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          iverilog \
          verilator \
          openjdk-17-jdk

    - name: Install Scala CLI
      run: |
        curl -fL https://github.com/VirtusLab/scala-cli/releases/latest/download/scala-cli-x86_64-pc-linux.gz | gunzip > scala-cli
        chmod +x scala-cli
        sudo mv scala-cli /usr/local/bin/scala-cli
    - name: Install Python and Python HDL dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install amaranth pytest numpy "meson>=1.10.1" meson-python setuptools_scm cocotb pytest-cov ninja vunit-hdl
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: Swatinem/rust-cache@v2

    - name: Install Spade
      run: |
        cargo install --locked --git https://gitlab.com/spade-lang/spade spade-lang
    - name: Check simulator installation
      run: |
        nvc --version # Make sure nvc was installed successfully
        ghdl --version # Make sure ghdl was installed successfully
        iverilog -V # Make sure iverilog was installed successfully
        verilator --version # Make sure verilator was installed successfully
    - name: Install nvc packages
      run: |
        nvc --install osvvm vunit
    - name: Install APyTypes
      run: |
        git fetch --tags
        python -m pip install --no-deps --no-build-isolation -v --editable .
    - name: Test with pytest
      run: |
        pytest --color=yes --cov=lib --log-level=DEBUG lib/test
    - name: Upload coverage reports to Codecov
      if: ${{ !cancelled()}}
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
      with:
        flags: hdl
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
