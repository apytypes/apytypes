name: Coverage
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linux_arm:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        os: ["ubuntu-24.04-arm"]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt-get install -yy lcov
        python -m pip install --upgrade pip
        python -m pip install pytest-cov gcovr ninja "meson>=1.10.1" meson-python numpy setuptools_scm
    - name: Install APyTypes
      run: |
        git fetch --tags
        export CPPFLAGS='-O0 --coverage -fprofile-abs-path'
        python -m pip install --no-deps --no-build-isolation -v --editable .
        unset CPPFLAGS
    - name: Test with pytest
      run: |
        pytest lib/test --cov-report=xml --cov=lib --log-level=DEBUG --color=yes
    - name: Format coverage data
      if: ${{ !cancelled()}}
      run: |
        lcov --rc branch_coverage=1 --rc geninfo_unexecuted_blocks=1 \
          --ignore-errors mismatch,mismatch --ignore-errors unused \
          --ignore-errors mismatch --capture --directory . \
          --output-file coverage.info
        lcov --rc branch_coverage=1 --rc geninfo_unexecuted_blocks=1 \
          --ignore-errors mismatch,mismatch --ignore-errors unused \
          --ignore-errors mismatch --extract coverage.info $PWD/src/'*'
        lcov --rc branch_coverage=1 --rc geninfo_unexecuted_blocks=1 \
          --ignore-errors mismatch,mismatch --ignore-errors unused \
          --ignore-errors mismatch --list coverage.info
        find . -name '*.gc*' -delete
        # gcovr --xml-pretty --exclude-unreachable-branches --print-summary -o cobertura.xml --root $PWD
    - name: Upload coverage reports to Codecov
      if: ${{ !cancelled()}}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  linux_third_party:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        os: ["ubuntu-latest"]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt-get install -yy lcov
        python -m pip install --upgrade pip
        python -m pip install pytest-cov gcovr ninja "meson>=1.10.1" meson-python numpy setuptools_scm
        python -m pip install jax tensorflow
        python -m pip install torch==2.3.1+cpu -f https://download.pytorch.org/whl/torch_stable.html
    - name: Install APyTypes
      run: |
        git fetch --tags
        export CPPFLAGS='-O0 --coverage -fprofile-abs-path'
        python -m pip install --no-deps --no-build-isolation -v --editable .
        unset CPPFLAGS
    - name: Test with pytest
      run: |
        pytest lib/test --cov-report=xml --cov=lib --log-level=DEBUG --color=yes
    - name: Format coverage data
      if: ${{ !cancelled()}}
      run: |
        lcov --rc branch_coverage=1 --rc geninfo_unexecuted_blocks=1 \
          --ignore-errors mismatch,mismatch --ignore-errors unused \
          --ignore-errors mismatch --capture --directory . \
          --output-file coverage.info
        lcov --rc branch_coverage=1 --rc geninfo_unexecuted_blocks=1 \
          --ignore-errors mismatch,mismatch --ignore-errors unused \
          --ignore-errors mismatch --extract coverage.info $PWD/src/'*'
        lcov --rc branch_coverage=1 --rc geninfo_unexecuted_blocks=1 \
          --ignore-errors mismatch,mismatch --ignore-errors unused \
          --ignore-errors mismatch --list coverage.info
        find . -name '*.gc*' -delete
        # gcovr --xml-pretty --exclude-unreachable-branches --print-summary -o cobertura.xml --root $PWD
    - name: Upload coverage reports to Codecov
      if: ${{ !cancelled()}}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        flags: linux
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  windows_msvc:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        os: ["windows-latest"]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0
        fetch-tags: true
        persist-credentials: false
    - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      shell: pwsh
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest-cov ninja "meson>=1.10.1" meson-python numpy setuptools_scm
        choco install opencppcoverage --no-progress -y
    - name: Install APyTypes
      shell: pwsh
      run: |
        git fetch --tags
        python -m pip install --no-deps --no-build-isolation -v --editable . -Csetup-args=-Dbuildtype=release -Csetup-args=-Ddebug=true -Csetup-args=-Db_lto=false
    - name: Test with pytest and collect C++ coverage
      shell: pwsh
      run: |
        $openCppCoverage = $null
        $cmd = Get-Command OpenCppCoverage -ErrorAction SilentlyContinue
        if ($cmd) {
          $openCppCoverage = $cmd.Source
        }
        if (-not $openCppCoverage) {
          $chocoRoot = if ($env:ChocolateyInstall) { $env:ChocolateyInstall } else { 'C:\\ProgramData\\chocolatey' }
          $candidates = @(
            (Join-Path $chocoRoot 'bin\\OpenCppCoverage.exe'),
            (Join-Path $chocoRoot 'lib\\opencppcoverage\\tools\\OpenCppCoverage.exe'),
            (Join-Path $chocoRoot 'lib\\OpenCppCoverage\\tools\\OpenCppCoverage.exe'),
            (Join-Path ${env:ProgramFiles} 'OpenCppCoverage\\OpenCppCoverage.exe'),
            (Join-Path ${env:ProgramFiles(x86)} 'OpenCppCoverage\\OpenCppCoverage.exe')
          )
          foreach ($candidate in $candidates) {
            if ($candidate -and (Test-Path $candidate)) {
              $openCppCoverage = $candidate
              break
            }
          }
        }
        if (-not $openCppCoverage) {
          throw 'OpenCppCoverage executable not found in expected Chocolatey/Program Files locations.'
        }
        & $openCppCoverage --quiet --cover_children --sources "${{ github.workspace }}" --modules "*_apytypes*.pyd" --export_type cobertura:coverage-windows-msvc.xml -- python -m pytest lib/test --log-level=DEBUG --color=yes
        if (!(Test-Path 'coverage-windows-msvc.xml')) {
          throw 'OpenCppCoverage did not produce coverage-windows-msvc.xml'
        }
        if ((Get-Item 'coverage-windows-msvc.xml').Length -lt 200) {
          throw 'coverage-windows-msvc.xml was generated but appears empty'
        }
    - name: Upload coverage reports to Codecov
      if: ${{ !cancelled()}}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        files: coverage-windows-msvc.xml
        flags: windows
        disable_search: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  macos:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        os: ["macos-14", "macos-15-intel"]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-tags: true
        fetch-depth: 0
        persist-credentials: false
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        brew update
        # Periodically, Homebrew updates Python and fails to overwrite the
        # existing not-managed-by-Homebrew copy without explicitly being told
        # to do so. GitHub/Azure continues to avoid fixing their runner images:
        # https://github.com/actions/runner-images/issues/9966
        # so force an overwrite even if there are no Python updates.
        # We don't even care about Homebrew's Python because we use the one
        # from actions/setup-python.
        for python_package in $(brew list | grep python@); do
          brew unlink ${python_package}
          brew link --overwrite ${python_package}
        done
        # Workaround for https://github.com/actions/runner-images/issues/10984
        brew uninstall --ignore-dependencies --force pkg-config@0.29.2
        brew install ninja
        python -m pip install --upgrade pip
        python -m pip install pytest-cov gcovr ninja "meson>=1.10.1" meson-python numpy setuptools_scm
    - name: Install APyTypes
      run: |
        git fetch --tags
        export CPPFLAGS='-fprofile-instr-generate=default.%m.profraw'
        export CPPFLAGS="$CPPFLAGS -fcoverage-mapping -O0"
        python -m pip install --no-deps --no-build-isolation -v --editable .
        unset CPPFLAGS
    - name: Test with pytest
      run: |
        pytest lib/test --cov-report=xml --cov=lib --log-level=DEBUG --color=yes
    - name: Format coverage data
      if: ${{ !cancelled()}}
      run: |
            xcrun llvm-profdata merge -sparse default.*.profraw \
              -o default.profdata
            xcrun llvm-cov export -format="lcov" build/*/*.so \
              -instr-profile default.profdata > info.lcov
    - name: Upload coverage reports to Codecov
      if: ${{ !cancelled()}}
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
      with:
        flags: macos
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
