#
# This workflow will install Python dependencies and run the APyTypes test suite.
#
# For more information see:
# https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python
#

name: Unit tests
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.13t", "3.14", "3.14t", "3.15-dev"]
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-14, macos-15, macos-15-intel, macos-26-intel, macos-26] # windows-11-arm,
        numpy-version: [">=2.1"]
        exclude:
          # Only Python 3.13 and later for windows-11-arm
          - os: "windows-11-arm"
            python-version: "3.11"
          - os: "windows-11-arm"
            python-version: "3.12"
          # No free-threaded Python on Windows
          - os: "windows-latest"
            python-version: "3.13t"
          - os: "windows-latest"
            python-version: "3.14t"

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      with:
        fetch-depth: 0
        fetch-tags: true
        persist-credentials: false
    - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0  # Active MSVC environment on Windows virtual env
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
    - name: Install NumPy
      run: |
        python -m pip install 'numpy${{ matrix.numpy-version }}'
    - name: Install development NumPy
      if: contains(matrix.python-version, 'dev')
      run: |
        python -m pip install --pre --index-url https://pypi.anaconda.org/scientific-python-nightly-wheels/simple --upgrade --only-binary=:all: 'numpy${{ matrix.numpy-version }}'
    - name: Install APyTypes
      run: |
        git fetch --tags
        python -m pip install .[test] -v
    - name: Test with pytest (free-threaded)
      if: contains(matrix.python-version, 't')
      run: |
        export PYTHON_GIL=0
        pytest --color=yes lib/test --durations 10
    - name: Test with pytest
      run: |
        pytest --color=yes lib/test --durations 10
