name: WASM

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build_wasm:
    name: Build Wasm wheels
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        name: Install Python
        with:
          python-version: '3.11'

      - name: Install Cmake
        run: |
          sudo apt-get install -yy cmake

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.1.4

      - name: Build wheels for wasm
        run: python -m cibuildwheel --output-dir pyodide-dist
        env:
          CIBW_PLATFORM: pyodide
          PYODIDE_BUILD_EXPORTS: whole_archive

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: cibw-wheels-wasm
          path: pyodide-dist/*.whl
          if-no-files-found: error

  test_wasm:
    name: Test Wasm wheels
    needs: build_wasm
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        pyodide-version: ["0.27.7", "0.28.2"]
        node-version: ["24.9.0"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.12

      - uses: pyodide/pyodide-actions/download-pyodide@012fa537869d343726d01863a34b773fc4d96a14 # v2
        with:
          version: ${{ matrix.pyodide-version }}
          to: pyodide-dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cibw-wheels-wasm
          path: apytypes-wasm-wheels

      - name: Run tests with Pyodide in Node.js
        run: |
          cp -r apytypes-wasm-wheels/* pyodide-dist
          zip -r pyodide-dist/pyodide-home.zip pyproject.toml lib 1> /dev/null
          python -m http.server -d pyodide-dist &
          p=$!; while ! nc -z localhost 8000; do sleep 1; done; echo ready$pid $p$
          cp lib/test/run.mts pyodide-dist/run.mts
          cd pyodide-dist
          node run.mts $(ls ../apytypes-wasm-wheels)
